; Geppetto — firmware for TWO RP2040 Picos soldered GP0<->GP1 (UART0 crossover)
; + common grounds. Flash this SAME firmware to both boards; role is decided at
; runtime by which input is active (see src/main.cpp):
;   * board fed by USB-CDC (host script) relays frames out the UART  -> "bridge"
;   * board fed by UART (its partner)     emits them as USB HID       -> "gadget"
;
; First flash: hold BOOTSEL, board shows as RPI-RP2 mass storage, copy the .uf2
; (or `pio run -t upload`). After that it enumerates as composite HID+CDC+MSC.

[env:pico]
; earlephilhower core lives in this platform fork (the stock `raspberrypi`
; platform only ships the Arduino-Mbed core, which ignores board_build.core).
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; Use the Adafruit TinyUSB stack so we can present a CUSTOM composite device
; (8-button mouse + keyboard + consumer) alongside CDC serial and an MSC drive.
board_build.usbstack = tinyusb

; Regenerate the embedded host-client disk image (src/disk_image.h) before every
; build so it always matches ../client. Needs dosfstools (mkfs.fat) + mtools
; (mcopy) + xxd on the build host.
extra_scripts = pre:tools/prebuild.py

; -DUSE_TINYUSB selects the Adafruit TinyUSB stack. CDC/HID/MSC instance counts
; come from the core's own tusb_config.h — don't redefine them here.
build_flags =
    -DUSE_TINYUSB

upload_speed = 921600
monitor_speed = 115200
